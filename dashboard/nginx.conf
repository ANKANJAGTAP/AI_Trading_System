server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Putting the upstream in a VARIABLE forces nginx to
    # re-resolve `api` per request (TTL 10s) instead of caching its IP once at
    # startup — so rebuilding the api container (which gives it a fresh IP) no
    # longer leaves the dashboard proxying a dead address (502 Bad Gateway).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
