name: CI

# #33: gate every push/PR on the test suite + secret scan, so a regression or a
# committed secret is caught before it can reach the server.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: pytest -q
      - name: Secret scan
        run: python scripts/scan_secrets.py
