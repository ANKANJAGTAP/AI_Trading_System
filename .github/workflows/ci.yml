name: CI

# #33/#34: gate every push/PR on the test suite + secret scan, and scan the built
# image for known HIGH/CRITICAL vulnerabilities. A regression, a committed secret,
# or a vulnerable base layer is caught before it can reach the server.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: pytest -q
      - name: Secret scan
        run: python scripts/scan_secrets.py

  image-scan:
    # #34: base image is already digest-pinned in the Dockerfile; this reports
    # known vulnerabilities. Report-only for now (exit-code 0) — flip to 1 to
    # enforce once the baseline is clean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ats-api:ci .
      - name: Trivy scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ats-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
