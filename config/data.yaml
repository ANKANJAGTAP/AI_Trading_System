  # F&O paper universe: (NFO option `name`, its underlying quote key). The slow loop
  # builds a live FnoContext per entry and routes through the F&O pipeline.
  fno:
    - {name: "NIFTY",     underlying: "NSE:NIFTY 50"}
    - {name: "BANKNIFTY", underlying: "NSE:NIFTY BANK"}
    - {name: "RELIANCE",  underlying: "NSE:RELIANCE"}
