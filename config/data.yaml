  # MCX intraday universe: FRONT-MONTH futures resolved dynamically each boot/day
  # (contract symbols roll monthly, so names - not symbols - live in config).
  # Mini contracts fit the 10% sleeve on 10L capital; GOLD(1kg)/SILVER(30kg) do not.
  mcx_futures: ["GOLDM", "SILVERM", "CRUDEOIL", "NATURALGAS"]

backfill:
  # Canonical interval names (1m/3m/5m/15m/day) map to Kite's historical names in
  # data/historical.py. Kite caps the date range per request per interval, so the
  # loader chunks requests using max_days_per_request.
  intervals: ["day", "15m", "5m", "1m"]
  lookback_days:
    day: 2000
    15m: 365
    5m: 90
    1m: 30
  max_days_per_request:
    day: 2000
    15m: 200
    5m: 100
    3m: 100
    1m: 60
  # Exchanges loaded into the instruments master ([] or omit => full dump).
  instrument_exchanges: ["NSE", "NFO", "BSE", "MCX", "CDS"]
