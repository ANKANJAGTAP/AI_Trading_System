# Section 7 — Data Layer: rate-limit governor, candle aggregation, feed.

# Rate-limit governor: token-bucket per endpoint class. All Kite REST calls are
# routed through this (no component calls Kite REST directly). Values are
# conservative defaults below Kite's published hard limits — tune as needed.
rate_limits:
  quote:
    capacity: 1
    refill_per_sec: 1
  historical:
    capacity: 3
    refill_per_sec: 3
  order:
    capacity: 8           # below Kite's ~10/s ceiling
    refill_per_sec: 8
  other:
    capacity: 8
    refill_per_sec: 8
  order_count_guard:
    per_minute_cap: 200
    daily_cap: 3000       # halt new entries + alert before exchange cap is hit
    alert_threshold_pct: 80

candles:
  intervals: ["1m", "3m", "5m", "15m", "day"]
  attach_oi_at_close: true     # for F&O / MCX
  persist_immediately: true
  reconcile_on_reconnect: true # backfill missing candles from historical API

feed:
  tick_mode_default: "quote"   # ltp | quote | full (full for depth/OI)
  reconnect_backoff_seconds: [1, 2, 5, 10, 30]
  max_reconnect_attempts: 0    # 0 = infinite (with backoff)
  staleness_seconds: 30        # no ticks for this long => treat feed as stale
  heartbeat_seconds: 5
  reconnect_after_stale_seconds: 60   # during market hours, rebuild a stale feed
  market_window: ["09:15", "15:30"]   # NSE; MCX session handled per-sleeve later

# Phase 1 default watchlist for the live feed + backfill. The dynamic
# profit-oriented universe screening arrives in Phase 4; this is the seed set.
# Entries are EXCHANGE:TRADINGSYMBOL (indices use the index tradingsymbol).
universe:
